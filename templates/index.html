<!DOCTYPE html>
<html>
<head>
    <title>Employee Attrition Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Employee Attrition Prediction</h1>

    <input type="number" id="age" placeholder="Age">
    <input type="number" id="income" placeholder="Monthly Income">
    <input type="number" id="distance" placeholder="Distance From Home">
    <input type="number" id="years" placeholder="Years At Company">
    <input type="number" id="job" placeholder="Job Satisfaction (1-4)">
    <input type="number" id="env" placeholder="Environment Satisfaction (1-4)">
    <input type="number" id="balance" placeholder="Work Life Balance (1-4)">
    <input type="number" id="companies" placeholder="Companies Worked">
    <input type="number" id="hike" placeholder="Salary Hike %">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
function predict() {
    fetch('/predict', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            age: document.getElementById('age').value,
            income: document.getElementById('income').value,
            distance: document.getElementById('distance').value,
            years: document.getElementById('years').value,
            job: document.getElementById('job').value,
            env: document.getElementById('env').value,
            balance: document.getElementById('balance').value,
            companies: document.getElementById('companies').value,
            hike: document.getElementById('hike').value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById('result').innerHTML =
        `<h2>${data.prediction}</h2>
         <p>Confidence: ${data.confidence}%</p>`;
    })
}
</script>

</body>
</html>
